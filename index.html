<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- iOS Home Screen behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Adventure Island" />
    <meta name="theme-color" content="#08328c" />

    <!-- App icons -->
    <link rel="apple-touch-icon" href="../images/home1.png" />

    <link rel="manifest" href="manifest.json" />

    <title>Adventure Island 1</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --font-chalk: "Chalkboard SE", "Comic Sans MS", cursive, sans-serif;
        --bark: #2307fa;
        --bark-dark: #f4930b;
        --btn-text: #fad607;
        --white: #fffdf8;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
      }

      body {
        font-family: var(--font-chalk);
        /* Fallback gradient shows briefly before the background image loads */
        background: linear-gradient(to bottom, #6593f6, #08328c);
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }

      h1 {
        font-family: var(--font-chalk);
        color: #fae207;
        -webkit-text-stroke: 0.8px var(--bark-dark);
        width: 100%;
        text-align: center;
        letter-spacing: 0.03em;
        flex-shrink: 0;
      }

      .grid-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
      }

      .btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: var(--btn-text);
        background: var(--bark);
        border: 2px solid var(--bark-dark);
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.4em;
        padding: 0 0.6em;
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
        background: #1a05c4;
      }

      .btn-text {
        flex: 1;
        text-align: center;
        line-height: 1.05;
      }

      .btn-icon {
        height: 78%;
        width: auto;
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
      }

      /* LANDSCAPE */
      @media screen and (orientation: landscape) {
        body {
          background-image: url("./images/bg-land1.png");
          background-size: cover;
          background-position: center center;
          background-repeat: no-repeat;
        }

        h1 {
          font-size: clamp(2rem, 7vw, 7rem);
          padding: 0.1em 0.5em;
          margin-top: 5vh;
          margin-bottom: -8vh;
        }

        .grid-wrapper {
          padding: 1vh 2vw 2vh;
          margin-top: 2vh;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: 1fr;
          gap: clamp(6px, 1.4vw, 16px);
          width: min(96vw, 1300px);
        }

        .btn {
          font-size: clamp(1rem, 5vw, 3.6rem);
          height: clamp(80px, 45vh, 220px);
        }
      }

      /* LANDSCAPE IPHONE */
      @media screen and (orientation: landscape) and (max-height: 450px) {
        body {
          background-image: url("./images/bg-land1.png");
          background-size: cover;
          background-position: center center;
          background-repeat: no-repeat;
          width: 100vw !important;
          min-width: 100vw !important;
          overflow-x: hidden !important;
        }

        h1 {
          font-size: clamp(1rem, 7vw, 4rem) !important;
          padding: 0.1em 0.5em !important;
          margin-top: -3vh !important;
          margin-bottom: -8vh !important;
        }

        .grid-wrapper {
          padding: 1vh 4vw 2vh;
          margin-top: 1vh;
        }

        .btn {
          height: clamp(50px, 30vh, 120px) !important;
          font-size: clamp(0.8rem, 4.5vw, 2.6rem) !important;
        }
      }

      /* PORTRAIT */
      @media screen and (orientation: portrait) {
        body {
          overflow-y: auto;
          background-image: url("./images/bg-port1.png");
          background-size: cover;
          background-position: center center;
          background-repeat: no-repeat;
        }

        h1 {
          font-size: clamp(1.5rem, 12vw, 4rem);
          padding: 0.3em 0.5em;
        }

        .grid-wrapper {
          padding: 2vw 9vw 6vw;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr;
          grid-template-rows: repeat(3, 1fr);
          gap: clamp(8px, 6vw, 60px);
          width: 100%;
          max-width: 520px;
          min-height: 0;
        }

        .btn {
          font-size: clamp(1rem, 8vw, 3.4rem);
          height: clamp(70px, 24vw, 220px);
        }
      }

      /* PORTRAIT IPHONE */
      @media screen and (orientation: portrait) and (max-width: 430px) {
        h1 {
          font-size: clamp(1.1rem, 10.5vw, 3.9rem) !important;
          padding: 0.3em 0.5em !important;
          -webkit-text-stroke: 1.5px var(--bark-dark);
          line-height: 1;
          margin-top: max(40px, env(safe-area-inset-top, 30px)) !important;
        }

        .grid-wrapper {
          padding: 3.5vh 9vw 2vw !important;
        }

        .grid {
          gap: 23px !important;
          width: 100% !important;
          margin-top: -5vh !important;
        }

        .btn {
          height: clamp(80px, 30vw, 180px) !important;
          font-size: clamp(1rem, 10vw, 3.1rem) !important;
        }
      }
    </style>
  </head>

  <body>
    <h1>Adventure Island 1</h1>

    <div class="grid-wrapper">
      <div class="grid" id="main-grid">
        <a class="btn" href="wordup/index.html">
          <span class="btn-text">Word Up!</span>
          <img class="btn-icon" src="images/sw1.png" alt="Sami" />
        </a>

        <a class="btn" href="matchup/index.html">
          <span class="btn-text">Match Up!</span>
          <img class="btn-icon" src="images/km1.png" alt="Kevin" />
        </a>

        <a class="btn" href="typeup/index.html">
          <span class="btn-text">Type Up!</span>
          <img class="btn-icon" src="images/st1.png" alt="Sami" />
        </a>
      </div>
    </div>
  </body>
</html>
